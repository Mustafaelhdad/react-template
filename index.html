<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>react-template-vite-scaffold</title>
    <script>
      // Apply the persisted theme before first paint to avoid FOUC.
      // Mirrors the ThemeProvider in src/shared/lib/theme.tsx — keep in sync.
      ;(function () {
        try {
          var raw = localStorage.getItem('react-template:theme')
          var theme = raw ? JSON.parse(raw) : 'system'
          if (theme === 'system') {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
          }
          if (theme === 'dark') {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {
          /* ignore */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
