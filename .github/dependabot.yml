version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    open-pull-requests-limit: 10
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      tanstack:
        patterns:
          - '@tanstack/*'
      tooling:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - 'typescript-eslint'
          - 'prettier'
          - 'vite'
          - '@vitejs/*'
          - 'vitest'
          - '@vitest/*'
          - 'tailwindcss'
          - '@tailwindcss/*'
      testing:
        patterns:
          - '@testing-library/*'
          - 'jsdom'

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope
